<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>irxd</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="trunk"></div>
    <div class="marquee">
      <span>
        &nbsp; / &nbsp; work in progress &nbsp; / &nbsp; work in progress
      </span>
      <span>
        &nbsp; / &nbsp; work in progress &nbsp; / &nbsp; work in progress
      </span>
      <span>
        &nbsp; / &nbsp; work in progress &nbsp; / &nbsp; work in progress
      </span>
    </div>
    <div class="blog-link-wrapper">
      <a href="https://irxd.github.io/post" class="scramble read">read</a>
      <a href="https://github.com/irxd" class="scramble github">github</a>
      <a href="https://github.com/irxd" class="scramble linkedin">linkedin</a>
    </div>
  </body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.trunk.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <script src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/ScrambleTextPlugin3.min.js"></script>
  <script>
    VANTA.TRUNK({
      el: "#trunk",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0xd7d7d7,
      backgroundColor: 0x202020,
      spacing: 8.00,
      chaos: 7.00
    })
  </script>
  <script>
    gsap.registerPlugin(ScrambleTextPlugin);

    const scrambleRead = gsap.utils.toArray('.read');
    scrambleRead.forEach(item => {
      let tween = gsap.to(item, {
        duration: 1,
        scrambleText:{
          text:"読む",
          chars:"ボゼ"
        },
        paused: true
      });
      item.addEventListener('mouseenter', () => {
        tween.play();
      });
      item.addEventListener("mouseleave", () => {
        tween.reverse();
      });
    });

    const scrambleGithub = gsap.utils.toArray('.github');
    scrambleGithub.forEach(item => {
      let tween = gsap.to(item, {
        duration: 1,
        scrambleText:{
          text:"ギットハブ",
          chars:"ギトロユプ"
        },
        paused: true
      });
      item.addEventListener('mouseenter', () => {
        tween.play();
      });
      item.addEventListener("mouseleave", () => {
        tween.reverse();
      });
    });

    const scrambleLinkedin = gsap.utils.toArray('.linkedin');
    scrambleLinkedin.forEach(item => {
      let tween = gsap.to(item, {
        duration: 1,
        scrambleText:{
          text:"リンクイン",
          chars:"ウビロミャ"
        },
        paused: true
      });
      item.addEventListener('mouseenter', () => {
        tween.play();
      });
      item.addEventListener("mouseleave", () => {
        tween.reverse();
      });
    });

    gsap.config({trialWarn: false});
  </script>
</html>
